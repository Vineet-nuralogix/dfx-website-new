<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Open Sans", sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #000;
            color: #fff;
        }

        #bg-wallpaper {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: url('assets/imgs/common_wallpaper.png') center center / cover no-repeat;
        }

        .sticky-top-cards {
            position: sticky;
            top: 0;
            z-index: 50;
            background: url('assets/imgs/common_wallpaper.png') center center / cover no-repeat fixed;
            padding-bottom: 4px;
        }

        #main-header {
            text-align: center;
            color: #005DBC;
            font-weight: 600;
            margin: 20px 0;
        }

        a {
            color: #5ba5ff;
        }

        .result {
            display: grid;
            grid-template-columns: 40px 1fr auto auto;
            grid-template-rows: auto auto;
            column-gap: 10px;
            align-items: center;
            padding: 12px 14px;
            margin: 6px 0;
            background: rgba(10,20,40,0.72);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 14px;
            font-size: 1.2em;
        }

        .result-icon {
            grid-column: 1;
            grid-row: 1;
            width: 32px;
            height: 32px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .result-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .result-icon.fallback {
            font-size: 20px;
            text-align: center;
            line-height: 32px;
            color: currentColor;
        }

        .result-name-wrapper {
            grid-column: 2;
            grid-row: 1;
            min-width: 0;
        }

        .result-name {
            color: #fff;
            font-size: 1.15em;
        }

        .result-info-icon {
            border: none;
            background-color: white;
            color: #1a2335;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            margin-right: 0;
            margin-left: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.45em;
            cursor: pointer;
            vertical-align: top;
        }

        #snrContainer .result-info-icon,
        #starsContainer .result-info-icon {
            margin-left: 5px;
            margin-right: 0;
        }

        .result-info-icon:hover,
        .result-info-icon:active,
        .result-info-icon:focus {
            outline: none;
            background-color: none;
        }

        .result-value {
            grid-column: 3;
            grid-row: 1;
            margin-left: 8px;
            font-size: 1.55em;
            color: white;
            white-space: nowrap;
        }

        .result-unit {
            grid-column: 4;
            grid-row: 1;
            margin-left: 0.3em;
            font-size: 0.95em;
            color: #aaa;
            align-self: flex-end;
            padding-bottom: 0.15em;
        }

        /* Inline gauge bar */
        .result-gauge-wrapper {
            grid-column: 1 / -1;
            grid-row: 2;
            padding-top: 8px;
        }

        .result-gauge-track {
            display: flex;
            gap: 3px;
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
        }

        .result-gauge-segment {
            flex: 1;
        }

        .result-gauge-pointer-wrapper {
            position: relative;
            height: 14px;
            margin-top: -2px;
        }

        .result-gauge-pointer {
            position: absolute;
            transform: translateX(-50%);
            top: 0;
        }

        /* Wellness dial */
        .wellness-dial-card {
            background: rgba(10,20,40,0.72);
            border: 1.5px solid rgba(255,255,255,0.35);
            border-radius: 20px;
            padding: 20px 8px 8px;
            margin-top: 16px;
            margin-bottom: 8px;
            text-align: center;
        }

        .wellness-dial-card svg {
            width: 90%;
            max-width: 480px;
            height: auto;
            display: block;
            margin: 0 auto -18px;
        }

        .wellness-dial-label {
            margin: 0 0 0;
            color: #fff;
            font-size: 1.75em;
            font-weight: bold;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .wellness-dial-streak {
            width: 68%;
            height: 2px;
            border-radius: 2px;
            background: linear-gradient(90deg, transparent, #56AAFF 38%, #56AAFF 62%, transparent);
            margin: 12px auto 2px;
        }

        .wellness-dial-label .result-info-icon {
            margin-left: 2px;
            align-self: flex-start;
            margin-top: 1px;
            font-size: 0.38em;
            width: 12px;
            height: 12px;
        }

        /* Multi-year CVD slider */
        .multi-year-result {
            display: block;
            padding-bottom: 0.35rem;
        }

        .multi-year-main-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .multi-year-main-row .result-name-wrapper {
            flex: 1;
        }

        .multi-year-selected-label {
            color: #aaa;
            font-size: 0.85em;
            line-height: 1.2;
            margin: -0.15rem 0 0.25rem;
            text-align: right;
        }

        .multi-year-slider-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #aaa;
            font-size: 0.75em;
        }

        .multi-year-slider {
            flex: 1;
            min-width: 0;
            accent-color: #e8eaf0;
            cursor: pointer;
        }

        .multi-year-slider:focus-visible {
            outline: 2px solid #e8eaf0;
            outline-offset: 3px;
        }

        h2 {
            margin-top: 15px;
            margin-bottom: 15px;
            color: #56AAFF;
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 0;
        }


        .star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            display: inline-block;
            height: 100%;
            aspect-ratio: 1;
            align-items: center;
        }

        .greenBackground {
            background-color: #00de93;
        }

        .greyBackground {
            background-color: #909090;
        }

        .green {
            color: #00de93;
        }

        .lightGreen {
            color: #72e9b4;
        }

        .yellow {
            color: #ffeb78;
        }

        .lightRed {
            color: #ff8286;
        }

        .red {
            color: #ff444f;
        }

        .grey {
            color: #aaa;
        }

        #timestamp {
            color: #aaa;
            font-weight: bold;
            font-size: 0.9em;
        }

        #main-container {
            margin: 1em;
        }

        .info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10,20,40,0.72);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 12px;
            padding: 10px 16px;
            margin: 8px 0 10px;
        }

        #measurementInfo {
            align-content: center;
            color: #aaa;
            font-size: 1em;
            display: flex;
            align-items: center;
        }

        #measurementInfo span+span {
            border-left: solid rgba(255,255,255,0.25) 1px;
        }

        #snrContainer {
            font-weight: bold;
            padding-left: 0.5em;
            padding-right: 0.5em;
            color: #fff;
        }

        #starsContainer {
            padding-left: 0.5em;
            padding-right: 0.5em;
            display: flex;
            align-items: center;
            height: 1.5em;
            white-space: nowrap;
        }

        #results-container {
            display: block;
            max-width: 55em;
            margin-left: auto;
            margin-right: auto;
        }

        /* Loading / error states */
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.1rem;
            color: #999;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #005DBC;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .error-message {
            border: 2px solid #ef5350;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #fff;
            background: #b71c1c;
            margin: 20px auto;
            max-width: 55em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }



        /* Navigation buttons footer */
        footer {
            background-color: transparent;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }

        .button-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 1em;
        }

        .button {
            padding: 10px 28px;
            font-family: "Open Sans", sans-serif;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .button:hover {
            opacity: 0.85;
        }

        .button-primary {
            background: #F65F77;
            color: white;
        }

        .button-secondary {
            background: #005DBC;
            color: white;
        }

        /* Point info dialog */
        .point-info-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.35);
            padding: 1rem;
            z-index: 1000;
        }

        .point-info-overlay.visible {
            display: flex;
        }

        .point-info-dialog {
            background: #1a1a1a;
            border-radius: 12px;
            max-width: 520px;
            max-height: 80vh;
            width: 100%;
            padding: 1.5rem;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow-y: auto;
        }

        .point-info-title {
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: #005DBC;
        }

        .point-info-close {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            border: none;
            background: none;
            color: #aaa;
            font-weight: 600;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .point-info-close::before { content: '×'; }

        .point-info-close:hover,
        .point-info-close:active,
        .point-info-close:focus {
            background: none;
            outline: none;
        }

        .point-info-content p { margin: 0.5rem 0; }

        .point-info-body {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .point-info-segments {
            background: linear-gradient(135deg, #1a1f2e 0%, #151922 100%);
            border: 1px solid #2a3050;
            border-radius: 18px;
            padding: 1rem 1.25rem 1.35rem;
        }

        .point-info-current-value {
            font-size: 2.2rem;
            font-weight: 600;
            text-align: center;
        }

        .point-info-segments-track-wrapper {
            position: relative;
            margin-top: 0.8rem;
        }

        .point-info-segments-track {
            position: relative;
            display: flex;
            gap: 3px;
            height: 12px;
            border-radius: 999px;
            overflow: hidden;
            background-color: #333;
        }

        .point-info-segment-block { flex: 1; }

        .point-info-segment-pointer {
            position: absolute;
            top: 100%;
            transform: translateX(-50%) translateY(-10px);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .point-info-special-block { padding: 0 0.25rem; }

        .point-info-state-label {
            margin: 0 0 0.35rem;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #aaa;
        }

        .point-info-markdown {
            color: #eee;
            font-size: 0.95rem;
            line-height: 1.55;
            word-break: break-word;
        }

        .point-info-markdown h3,
        .point-info-markdown h4 { margin: 1rem 0 0.35rem; color: #005DBC; }

        .point-info-markdown p { margin: 0.4rem 0; }

        .point-info-markdown-list { padding-left: 1.25rem; margin: 0.35rem 0; }

        .point-info-markdown table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.85rem 0;
            font-size: 0.9rem;
        }

        .point-info-markdown th,
        .point-info-markdown td { border: 1px solid #444; padding: 0.5rem; text-align: left; }

        .point-info-markdown th { background: #222; font-weight: 600; }

        .point-info-markdown a { color: #255be3; text-decoration: none; }
        .point-info-markdown a:hover { text-decoration: underline; }

        .point-info-stars {
            display: flex;
            justify-content: center;
            gap: 0.35rem;
            margin-bottom: 0.5rem;
        }

        .point-info-stars .star { width: 1.4rem; height: 1.4rem; }
        .point-info-star-content { text-align: center; }

        .point-info-legend-title {
            margin-top: 1rem;
            margin-bottom: 0.25rem;
            font-weight: 600;
            color: #005DBC;
        }

        .point-info-scale-list { list-style: none; padding: 0; margin: 0.5rem 0 0; }

        .point-info-scale-list li {
            display: flex;
            align-items: center;
            margin-bottom: 0.35rem;
            font-size: 0.95rem;
        }

        .point-info-color-swatch {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 999px;
            margin-right: 0.5rem;
            flex-shrink: 0;
        }

        .point-info-color-swatch.green     { background-color: #00de93; }
        .point-info-color-swatch.lightGreen { background-color: #72e9b4; }
        .point-info-color-swatch.yellow    { background-color: #ffeb78; }
        .point-info-color-swatch.lightRed  { background-color: #ff8286; }
        .point-info-color-swatch.red       { background-color: #ff444f; }
        .point-info-color-swatch.grey      { background-color: #909090; }

        .point-info-subsection h3 {
            margin-top: 1rem;
            margin-bottom: 0.25rem;
            color: #005DBC;
            font-size: 1.05rem;
        }

        body.info-dialog-open { overflow: hidden; }

        /* QR share overlay */
        .qr-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .qr-overlay.visible { display: flex; }
        .qr-card {
            background: #fff;
            border-radius: 24px;
            padding: 32px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 480px;
            width: 90%;
        }
        .qr-card-title {
            color: #000;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
        }

        #qr-canvas-container img { display: block; }
        .qr-close-btn {
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 32px;
            font-size: 0.95rem;
            cursor: pointer;

        /* Info bar action buttons (Exit / Share) */
        .info-bar-btn {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 7px;
            padding: 7px 16px;
            font-size: 0.88rem;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
        }
        .info-bar-btn:hover { background: #2a2a2a; }

        .footer-disclaimer {
            font-size: 0.75rem;
            color: #999;
            text-align: center;
            white-space: pre-line;
            line-height: 1.4;
            margin: 16px 1rem 1rem;
        }

<body>
    <div id="bg-wallpaper"></div>
    <div id="main-container">
        <div id="measurementInfo"></div>
        <div id="timestamp"></div>

        <div id="loadingMessage" class="loading">
            <div class="loading-spinner"></div>
            <span data-i18n="loading">Loading measurement results...</span>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;">
            <p id="errorText">Unable to load measurement results</p>
            <button class="info-bar-btn" style="margin-top:16px" onclick="backToHome()">Exit</button>
        </div>

        <div id="resultsContent" style="display: none;">
            <div id="results-container"></div>
        </div>
    </div>
    <!-- QR code share overlay -->
    <div class="qr-overlay" id="qr-overlay" role="dialog" aria-modal="true">
        <div class="qr-card">
            <div class="qr-card-title" id="qr-card-title">Scan the QR Code below to get your results on your phone</div>
            <div id="qr-canvas-container"></div>
            <button class="qr-close-btn" onclick="closeQROverlay()">Close</button>
        </div>
    </div>

    <footer>
        <div id="disclaimer-container"></div>
    </footer>

    <script src="js/vendor/float16.min.js"></script>
    <script src="js/vendor/qrcode.min.js"></script>
    <script src="js/common.js"></script>

    <script>
        // Dev helper: decode microsite-style ?r= URL param into sessionStorage
        (function () {
            const r = new URLSearchParams(window.location.search).get('r');
            if (!r || sessionStorage.getItem('measurementData')) return;
            try {
                const { getFloat16 } = float16;

                function crc16hash(str) {
                    let buf = Array.from(str).map(c => c.charCodeAt(0));
                    let crc = 0xFFFF;
                    for (let i = 0; i < buf.length; i++) {
                        crc ^= buf[i];
                        for (let j = 0; j < 8; j++) {
                            let odd = crc & 1; crc >>= 1;
                            if (odd) crc ^= 0xA001;
                        }
                    }
                    return `${crc & 0xFF}${(crc >> 8) & 0xFF}`;
                }

                // Build reverse map: hashString -> pointID string
                const reverseMap = {};
                const defs = DeepAffexWebResultsData.definitions.pointDefinitions;
                for (const key of Object.keys(defs)) reverseMap[crc16hash(key)] = key;
                ['SNR', 'STAR_RATING', 'BODY_TEMPERATURE'].forEach(k => reverseMap[crc16hash(k)] = k);
                // Add dynamic multi-value keys (COUNT + 0-indexed primary path, 1-indexed fallback path)
                ['CVD_MULTI_YEAR_RISK_PROBS'].forEach(base => {
                    reverseMap[crc16hash(`${base}_COUNT`)] = `${base}_COUNT`;
                    for (let i = 0; i <= 20; i++) reverseMap[crc16hash(`${base}_${i}`)] = `${base}_${i}`;
                });

                const raw = atob(decodeURIComponent(r));
                const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
                if (bytes[0] !== 0x4e || bytes[1] !== 0x51 || bytes[2] !== 0x31)
                    throw new Error('Invalid NuraQR header');

                const tsNum = new DataView(bytes.buffer, 3, 4).getUint32(0, true);
                const ts = tsNum.toString();
                const timestamp = new Date(
                    parseInt('20' + ts.slice(0, 2)), parseInt(ts.slice(2, 4)) - 1,
                    parseInt(ts.slice(4, 6)), parseInt(ts.slice(6, 8)), parseInt(ts.slice(8, 10))
                );

                const payload = bytes.slice(7);
                const results = { timestamp: timestamp.toISOString() };
                for (let i = 0; i + 3 < payload.length; i += 4) {
                    const hash = `${payload[i]}${payload[i + 1]}`;
                    const pointID = reverseMap[hash];
                    const val = parseFloat(getFloat16(new DataView(payload.buffer, payload.byteOffset + i + 2, 2), 0, true).toFixed(2));
                    if (pointID !== undefined) results[pointID] = val;
                }

                sessionStorage.setItem('measurementData', JSON.stringify(results));
            } catch (e) {
                console.error('Failed to decode ?r= param:', e);
            }
        })();
    </script>
    <script>
        const resultTranslations = {
            en: { title: 'Measurement Results', btn_back: '← Back', btn_home: 'Back to Home', loading: 'Loading measurement results...' },
            zh: { title: '测量结果', btn_back: '← 返回', btn_home: '返回主页', loading: '正在加载测量结果...' }
        };

        function applyResultTranslations(lang) {
            const t = resultTranslations[lang] || resultTranslations['en'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key] !== undefined) el.textContent = t[key];
            });
        }

        // ------------------------------------------------------------------
        // Standalone mode: hide kiosk navigation when page is opened via QR
        // ------------------------------------------------------------------
        const _urlParams = new URLSearchParams(window.location.search);
        const isStandalone = _urlParams.get('standalone') === '1';
        // ------------------------------------------------------------------
        // NuraQR v1 encoder — mirrors the Android MeasurementResultViewModel
        // ------------------------------------------------------------------
        function crc16bytes(str) {
            let crc = 0xFFFF;
            for (let i = 0; i < str.length; i++) {
                crc ^= str.charCodeAt(i);
                for (let j = 0; j < 8; j++) {
                    const odd = crc & 1; crc >>= 1;
                    if (odd) crc ^= 0xA001;
                }
            }
            return [crc & 0xFF, (crc >> 8) & 0xFF]; // little-endian [lsb, msb]
        }

        function encodeResultsToNuraQR(results) {
            const { setFloat16 } = float16;
            // Timestamp bytes (yyMMddHHmm as uint32 little-endian)
            const ts = results.timestamp ? new Date(results.timestamp) : new Date();
            const pad = n => String(n).padStart(2, '0');
            const tsNum = parseInt(
                String(ts.getFullYear()).slice(2) +
                pad(ts.getMonth() + 1) +
                pad(ts.getDate()) +
                pad(ts.getHours()) +
                pad(ts.getMinutes())
            );
            const tsBuf = new Uint8Array(4);
            new DataView(tsBuf.buffer).setUint32(0, tsNum, true);

            // Results payload
            const chunks = [];
            for (const [key, value] of Object.entries(results)) {
                if (key === 'timestamp') continue;
                if (typeof value !== 'number' || !isFinite(value)) continue;
                const [lsb, msb] = crc16bytes(key);
                const f16buf = new ArrayBuffer(2);
                setFloat16(new DataView(f16buf), 0, value, true);
                const f16 = new Uint8Array(f16buf);
                chunks.push(lsb, msb, f16[0], f16[1]);
            }

            const header = [0x4e, 0x51, 0x31, ...tsBuf];
            const allBytes = new Uint8Array([...header, ...chunks]);
            const base64 = btoa(String.fromCharCode(...allBytes));
            return encodeURIComponent(base64);
        }

        function buildShareURL(results) {
            const encoded = encodeResultsToNuraQR(results);
            const mid = results.measurementID || '';
            const cfgUrl = (typeof APP_CONFIG !== 'undefined' && APP_CONFIG.qrCodeResults?.url) || '';
            const base = cfgUrl || (window.location.origin + window.location.pathname);
            const sep = base.includes('?') ? '&' : '?';
            return `${base}${sep}r=${encoded}&mid=${encodeURIComponent(mid)}&standalone=1`;
        }

        // ------------------------------------------------------------------
        // QR overlay
        // ------------------------------------------------------------------
        let _qrInstance = null;

        function openQROverlay() {
            const overlay = document.getElementById('qr-overlay');
            overlay.classList.add('visible');
            document.body.classList.add('info-dialog-open');
            overlay.onclick = e => { if (e.target === overlay) closeQROverlay(); };

            const container = document.getElementById('qr-canvas-container');
            container.innerHTML = '';
            try {
                const url = buildShareURL(measurementData);
                console.log('[QR] URL length:', url.length, url.slice(0, 80) + '...');
                _qrInstance = new QRCode(container, {
                    text: url,
                    width: 280,
                    height: 280,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            } catch (err) {
                console.error('[QR] Failed to generate QR code:', err);
                container.innerHTML = '<p style="color:#c00;padding:16px;text-align:center;font-size:0.85rem">' +
                    'QR generation failed: ' + err.message + '</p>';
            }
        }

        function closeQROverlay() {
            document.getElementById('qr-overlay').classList.remove('visible');
            document.body.classList.remove('info-dialog-open');
        }

        // ------------------------------------------------------------------
        // Info bar: standalone → show date; kiosk → show [Exit] [Share]
        // ------------------------------------------------------------------
        function maybeAddShareButton() {
            const infoBar = document.querySelector('.info-bar');
            const timestamp = document.getElementById('timestamp');
            if (!infoBar || !timestamp) return;

            if (isStandalone) {
                // Date is already in the info bar — nothing to change
                return;
            }

            // Non-standalone: replace date with action buttons
            timestamp.remove();

            const btnGroup = document.createElement('div');
            btnGroup.style.cssText = 'display:flex;align-items:center;gap:8px';

            const exitBtn = document.createElement('button');
            exitBtn.className = 'info-bar-btn';
            exitBtn.textContent = 'Exit';
            exitBtn.onclick = backToHome;
            btnGroup.appendChild(exitBtn);

            const tryAgainBtn = document.createElement('button');
            tryAgainBtn.className = 'info-bar-btn';
            tryAgainBtn.textContent = 'Try Again';
            tryAgainBtn.onclick = tryAgain;
            btnGroup.appendChild(tryAgainBtn);

            const qrEnabled = typeof APP_CONFIG !== 'undefined' && APP_CONFIG.qrCodeResults?.enabled;
            if (qrEnabled) {
                const shareBtn = document.createElement('button');
                shareBtn.className = 'info-bar-btn';
                shareBtn.textContent = 'Share';
                shareBtn.onclick = openQROverlay;
                btnGroup.appendChild(shareBtn);
            }

            infoBar.appendChild(btnGroup);
        }

        let measurementData = null;

        function isAndroidBridgeAvailable() {
            return typeof AndroidBridge !== 'undefined' && AndroidBridge !== null;
        }

        // Called by Android native to deliver results
        function setMeasurementResults(paramsJson) {
            try {
                measurementData = JSON.parse(paramsJson);
                displayResults(measurementData);
            } catch (error) {
                console.error('Error parsing measurement data:', error);
                showError('Data parsing error: ' + error.message);
            }
        }

        function displayResults(results) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('resultsContent').style.display = 'block';

            if (!results || results.length === 0) {
                showError('No measurement results available');
                return;
            }

            results["timestamp"] = results.timestamp ? new Date(results.timestamp) : new Date();

            const locale = localStorage.getItem('selectedLanguage') || getLocale();
            renderResults(
                results,
                DeepAffexWebResultsData.definitions.pointDefinitions,
                DeepAffexWebResultsData.sections,
                locale
            );
            renderDisclaimer(locale);
            maybeAddShareButton();
        }

        function showError(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('resultsContent').style.display = 'none';
            const errEl = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = message;
            errEl.style.display = 'block';
        }

        function startNewMeasurement() {
            if (isAndroidBridgeAvailable()) {
                try {
                    AndroidBridge.onJSRequest(JSON.stringify({
                        type: "navigate",
                        data: JSON.stringify({ destination: "profile", params: {} })
                    }));
                } catch (error) {
                    console.error('Failed to navigate to profile:', error);
                }
            } else {
                window.location.href = 'profile.html';
            }
        }

        function tryAgain() {
            const saved = localStorage.getItem('lastProfileData');
            const params = saved ? JSON.parse(saved) : {};
            if (isAndroidBridgeAvailable()) {
                try {
                    AndroidBridge.onJSRequest(JSON.stringify({
                        type: "navigate",
                        data: JSON.stringify({ destination: "measurement", params })
                    }));
                } catch (error) {
                    console.error('Failed to start new measurement:', error);
                }
            } else {
                window.location.href = 'profile.html';
            }
        }

        function backToHome() {
            localStorage.removeItem('lastProfileData');
            sessionStorage.removeItem('measurementData');
            if (isAndroidBridgeAvailable()) {
                try {
                    AndroidBridge.onJSRequest(JSON.stringify({
                        type: "navigate",
                        data: JSON.stringify({ destination: "index", params: {} })
                    }));
                } catch (error) {
                    console.error('Failed to navigate to home:', error);
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const savedLanguage = localStorage.getItem('selectedLanguage');
            applyResultTranslations(savedLanguage || 'en');
            if (savedLanguage && isAndroidBridgeAvailable()) {
                try {
                    AndroidBridge.onJSRequest(JSON.stringify({ type: "switchLanguage", data: savedLanguage }));
                } catch (error) {
                    console.error('Failed to sync language with Android:', error);
                }
            }

            const storedData = sessionStorage.getItem('measurementData');
            if (storedData) {
                setMeasurementResults(storedData);
            } else {
                showError('No measurement data found.');
            }
        });
    </script>
</body>
</html>
